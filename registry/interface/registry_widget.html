<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Registry v0.2</title>
<style>
  /* Reuse existing styles, just showing the delta or full file */
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f5ef;
    --bg-tertiary: #f0eee5;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border-tertiary: rgba(0, 0, 0, 0.12);
    --border-secondary: rgba(0, 0, 0, 0.25);
    --border-info: #185fa5;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SF Mono", "Monaco", "Inconsolata", "Roboto Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a18;
      --bg-secondary: #232321;
      --bg-tertiary: #2c2c2a;
      --text-primary: #f0eee5;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border-tertiary: rgba(255, 255, 255, 0.15);
      --border-secondary: rgba(255, 255, 255, 0.3);
    }
  }
  * { box-sizing: border-box; }
  body { font-family: var(--font-sans); color: var(--text-primary); background: var(--bg-tertiary); margin: 0; padding: 2rem 1rem; line-height: 1.7; }
  .container { max-width: 840px; margin: 0 auto; background: var(--bg-primary); border-radius: var(--radius-lg); padding: 2rem; border: 0.5px solid var(--border-tertiary); }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .meta-line { font-size: 13px; color: var(--text-secondary); margin: 0 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg-secondary); padding: 12px; border-radius: var(--radius-md); }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filter-btn, select, button { font-family: var(--font-sans); font-size: 13px; background: transparent; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 6px 12px; color: var(--text-primary); cursor: pointer; transition: background 0.15s; }
  .filter-btn:hover, button:hover { background: var(--bg-secondary); }
  .filter-btn.active { background: var(--bg-secondary); border-color: var(--border-secondary); }
  .spacer { flex: 1; }
  .row { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 12px 16px; cursor: pointer; margin-bottom: 8px; }
  .row:hover { border-color: var(--border-secondary); }
  .row.expanded { border-color: var(--border-info); }
  .row-main { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .row-id-block { flex: 1; min-width: 0; }
  .row-id { display: flex; align-items: baseline; gap: 8px; }
  .row-id .id { font-family: var(--font-mono); font-weight: 500; font-size: 13px; }
  .row-id .ver { font-size: 12px; color: var(--text-secondary); }
  .row-use { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .badges { display: flex; gap: 6px; align-items: center; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); font-weight: 500; }
  .b-prod { background: #EAF3DE; color: #27500A; }
  .b-active { background: #E6F1FB; color: #0C447C; }
  .b-draft { background: #FAEEDA; color: #633806; }
  .b-deprecated { background: #F1EFE8; color: #444441; }
  .b-tier-audit { background: #EEEDFE; color: #3C3489; }
  .b-tier-advisory { background: #E1F5EE; color: #085041; }
  .b-tier-reference { background: #F1EFE8; color: #444441; }
  .row-cost { text-align: right; min-width: 70px; }
  .row-cost-amt { font-size: 13px; font-weight: 500; }
  .row-cost-tok { font-size: 12px; color: var(--text-secondary); }
  .detail { display: none; padding-top: 12px; margin-top: 12px; border-top: 0.5px solid var(--border-tertiary); }
  .row.expanded .detail { display: block; }
  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 12px; font-size: 12px; margin-bottom: 12px; }
  .kv dt { color: var(--text-secondary); }
  .kv dd { margin: 0; }
  .kv .mono { font-family: var(--font-mono); }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .actions button { font-size: 12px; padding: 4px 10px; }
  .footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border-tertiary); font-size: 12px; color: var(--text-secondary); }
  .btn-eval { background: var(--border-info); color: white; border-color: var(--border-info); }
  .loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div class="container">

<h1>Prompt registry</h1>
<p class="meta-line" id="meta-line">Connected to prompt_studio.db</p>

<div class="stats">
  <div class="stat"><div class="stat-label">Total prompts</div><div class="stat-val" id="stat-total">0</div></div>
  <div class="stat"><div class="stat-label">In production</div><div class="stat-val" id="stat-prod">0</div></div>
  <div class="stat"><div class="stat-label">Drafts</div><div class="stat-val" id="stat-draft">0</div></div>
  <div class="stat"><div class="stat-label">Avg cost/run</div><div class="stat-val" id="stat-avg-cost">$0.00</div></div>
</div>

<div class="controls">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="audit">Audit</button>
  <button class="filter-btn" data-filter="draft">Drafts Only</button>
  <span class="spacer"></span>
</div>

<div id="rows">Loading registry data...</div>

<div class="footer">
  Unified Workflow v0.2 · Promoted from Sandbox → Evaluated via API → Registered to INDEX.json
</div>

</div>

<script>
let data = [];
let activeFilter = "all";

async function fetchPrompts() {
  try {
    const res = await fetch('/api/prompts');
    data = await res.json();
    updateStats();
    render();
  } catch (err) {
    document.getElementById("rows").innerHTML = `Error loading data: ${err.message}`;
  }
}

function updateStats() {
  document.getElementById("stat-total").textContent = data.length;
  document.getElementById("stat-prod").textContent = data.filter(d => d.status === 'production').length;
  document.getElementById("stat-draft").textContent = data.filter(d => d.status === 'draft').length;
  const costs = data.filter(d => d.cost_per_run_usd).map(d => d.cost_per_run_usd);
  const avg = costs.length ? costs.reduce((a, b) => a + b, 0) / costs.length : 0;
  document.getElementById("stat-avg-cost").textContent = `$${avg.toFixed(3)}`;
}

async function runEvaluation(id, version, btn) {
  const originalText = btn.textContent;
  btn.textContent = "Running Evaluation...";
  btn.classList.add("loading");
  
  try {
    const res = await fetch('/api/prompts/evaluate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        id, 
        version,
        model: "mlx-community/Qwen3-4B-Instruct-2507-4bit:localhost:8091" // Using the active 4B model
      })
    });
    const result = await res.json();
    if (res.ok) {
      alert(`Evaluation complete! Result persisted to database.\nReport: ${result.report}`);
      await fetchPrompts(); // Refresh the list to show new status
    } else {
      alert(`Evaluation failed: ${result.error}`);
    }
  } catch (err) {
    alert(`Error: ${err.message}`);
  } finally {
    btn.textContent = originalText;
    btn.classList.remove("loading");
  }
}

function render() {
  let rows = data.filter(d => {
    if (activeFilter === "all") return true;
    if (activeFilter === "draft") return d.status === "draft";
    return d.tier === activeFilter;
  });

  document.getElementById("rows").innerHTML = rows.map(d => `
    <div class="row" data-id="${d.id}-${d.version}">
      <div class="row-main">
        <div class="row-id-block">
          <div class="row-id">
            <span class="id">${d.id}</span>
            <span class="ver">@${d.version}</span>
          </div>
          <div class="row-use">${d.use_case || "No use case provided"}</div>
        </div>
        <div class="badges">
          <span class="badge b-tier-${d.tier}">${d.tier}</span>
          <span class="badge b-${d.status}">${d.status}</span>
        </div>
        <div class="row-cost">
          <div class="row-cost-amt">$${d.cost_per_run_usd || "0.00"}</div>
          <div class="row-cost-tok">${d.tokens_prompt_body || 0} tok</div>
        </div>
      </div>
      <div class="detail">
        <dl class="kv">
          <dt>Default model</dt><dd class="mono">${d.default_model || "any"}</dd>
          <dt>Eval status</dt><dd>${d.eval_status || "pending"}</dd>
          <dt>Notes</dt><dd>${d.notes || "No notes."}</dd>
        </dl>
        <div class="actions">
          <button onclick="event.stopPropagation(); alert(\`Body:\n\n\${data.find(x => x.id === '${d.id}' && x.version === '${d.version}').body}\`)">View body</button>
          <button class="btn-eval" onclick="event.stopPropagation(); runEvaluation('${d.id}', '${d.version}', this)">Run Automated Eval</button>
        </div>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".row").forEach(r => {
    r.addEventListener("click", () => r.classList.toggle("expanded"));
  });
}

document.querySelectorAll(".filter-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    activeFilter = b.dataset.filter;
    render();
  });
});

fetchPrompts();
</script>
</body>
</html>
