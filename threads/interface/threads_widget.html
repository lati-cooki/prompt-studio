<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root {
  --paper-2: #f6f6f8; --ink: #0d0d0f; --ink-3: #6b6b73; --ink-4: #8e8e97;
  --line: #d7d7dd; --green: #1f7a4d; --red: #b23a33;
  --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, monospace;
}
*, *::before, *::after { box-sizing: border-box; }
body { font-family: var(--sans); font-size: 13px; color: var(--ink);
  background: var(--paper-2); margin: 0; padding: 48px 24px 72px; }
.wrap { max-width: 820px; margin: 0 auto; }
h1 { font-weight: 600; font-size: 22px; margin: 0 0 4px; }
.sub { color: var(--ink-3); margin: 0 0 28px; }
a.back { color: var(--ink-3); text-decoration: none; cursor: pointer; }
.row { display: flex; justify-content: space-between; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
.row:hover { opacity: 0.75; }
.row .title { font-weight: 500; }
.row .meta { color: var(--ink-3); font-size: 12px; }
.badge { font-family: var(--mono); font-size: 11px; white-space: nowrap; }
.badge.ok { color: var(--green); }
.badge.bad { color: var(--red); }
.badge.pending { color: var(--ink-4); }
.side { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
button.pub-toggle { font-family: var(--mono); font-size: 11px; padding: 1px 8px;
  background: none; border: 1px solid var(--line); border-radius: 3px;
  color: var(--ink-3); cursor: pointer; }
button.pub-toggle:hover:not(:disabled) { border-color: var(--ink-3); color: var(--ink); }
button.pub-toggle:disabled { opacity: 0.5; cursor: default; }
.rec { padding: 8px 0; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12px; }
.rec .k { color: var(--ink-3); }
.err { color: var(--red); padding: 16px 0; }
.hash { color: var(--ink-4); }
</style>
</head>
<body>
<div class="wrap">
  <div id="header">
    <h1>Threads</h1>
    <p class="sub">Signed decision records from ThreadHub. <span class="badge">trusted: false — chain verification proves structure, never content.</span></p>
  </div>
  <div id="view"></div>
</div>
<script>
const view = document.getElementById('view');

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
function short(h) { return h ? esc(String(h).slice(0, 18)) + '…' : ''; }

async function getJSON(path) {
  const res = await fetch(path);
  if (!res.ok) {
    let code = res.status;
    try { code = (await res.json()).code || code; } catch (e) {}
    throw new Error(code);
  }
  return res.json();
}

async function showList() {
  view.innerHTML = '<p class="sub">Loading…</p>';
  let threads;
  try {
    threads = await getJSON('/api/threads');
  } catch (e) {
    view.innerHTML = '<p class="err">ThreadHub sidecar not running — start it via the launcher. (' + esc(e.message) + ')</p>';
    return;
  }
  if (!threads.length) { view.innerHTML = '<p class="sub">No threads yet.</p>'; return; }
  view.innerHTML = threads.map(t => `
    <div class="row" data-slug="${esc(t.slug)}">
      <span>
        <div class="title">${esc(t.title)}</div>
        <div class="meta">${esc(t.created_at)} · ${esc(t.created_by)}</div>
      </span>
      <span class="side">
        <span class="badge pending" data-verify="${esc(t.slug)}">checking…</span>
        <span>
          <span class="badge pending" data-pub="${esc(t.slug)}">pub?</span>
          <button class="pub-toggle" data-slug="${esc(t.slug)}" disabled>…</button>
        </span>
      </span>
    </div>`).join('');
  view.querySelectorAll('.row').forEach(r =>
    r.addEventListener('click', () => showDetail(r.dataset.slug)));
  view.querySelectorAll('button.pub-toggle').forEach(b =>
    b.addEventListener('click', togglePublish));
  threads.forEach(t => { fillBadge(t.slug); fillPubBadge(t.slug); });
}

// ── publication (Task 15): the record is the state — the badge reads the
// hub's effective publication state; the toggle appends the witnessed
// publish/unpublish act through the operator route.
async function fillPubBadge(slug) {
  const el = view.querySelector(`[data-pub="${CSS.escape(slug)}"]`);
  const btn = view.querySelector(`button.pub-toggle[data-slug="${CSS.escape(slug)}"]`);
  if (!el) return;
  try {
    const s = await getJSON('/api/threads/' + encodeURIComponent(slug) + '/publication');
    el.className = 'badge ' + (s.published ? 'ok' : 'pending');
    el.textContent = s.published ? 'published' : 'unpublished';
    if (btn) {
      btn.textContent = s.published ? 'unpublish' : 'publish';
      btn.dataset.published = s.published ? '1' : '';
      btn.disabled = false;
    }
  } catch (e) {
    el.className = 'badge bad';
    el.textContent = 'pub ' + esc(e.message);
    if (btn) btn.disabled = true;
  }
}

async function togglePublish(ev) {
  ev.stopPropagation(); // the row click opens the detail view
  const btn = ev.currentTarget;
  const slug = btn.dataset.slug;
  const verb = btn.dataset.published ? 'unpublish' : 'publish';
  btn.disabled = true;
  btn.textContent = verb + 'ing…';
  try {
    const res = await fetch('/api/threads/' + encodeURIComponent(slug) + '/' + verb,
                            { method: 'POST' });
    if (!res.ok) throw new Error(res.status);
    fillPubBadge(slug);
  } catch (e) {
    // Surface the refusal (e.g. 401 bearer-auth) instead of silently
    // reverting; the button stays usable for a retry.
    const el = view.querySelector(`[data-pub="${CSS.escape(slug)}"]`);
    if (el) { el.className = 'badge bad'; el.textContent = verb + ' failed: ' + esc(e.message); }
    btn.disabled = false;
    btn.textContent = verb;
  }
}

async function fillBadge(slug) {
  const el = view.querySelector(`[data-verify="${CSS.escape(slug)}"]`);
  if (!el) return;
  try {
    const v = await getJSON('/api/threads/' + encodeURIComponent(slug) + '/verify');
    el.className = 'badge ' + (v.valid ? 'ok' : 'bad');
    el.textContent = (v.valid ? '✓ chain valid' : '✗ broken') + ' · ' + v.records + ' records';
  } catch (e) {
    el.className = 'badge bad';
    el.textContent = '✗ ' + esc(e.message);
  }
}

async function showDetail(slug) {
  view.innerHTML = '<p class="sub"><a class="back" id="back">← all threads</a></p><p class="sub">Loading…</p>';
  document.getElementById('back').addEventListener('click', showList);
  let chain;
  try {
    chain = await getJSON('/api/threads/' + encodeURIComponent(slug));
  } catch (e) {
    view.innerHTML = '<p class="sub"><a class="back" id="back2">← all threads</a></p><p class="err">Could not load thread (' + esc(e.message) + ')</p>';
    document.getElementById('back2').addEventListener('click', showList);
    return;
  }
  if (!Array.isArray(chain)) {
    view.innerHTML = '<p class="sub"><a class="back" id="back2b">← all threads</a></p><p class="err">Unexpected response for this thread.</p>';
    document.getElementById('back2b').addEventListener('click', showList);
    return;
  }
  let badge = '<span class="badge pending">verifying…</span>';
  let head = '';
  try {
    const verify = await getJSON('/api/threads/' + encodeURIComponent(slug) + '/verify');
    badge = verify.valid
      ? `<span class="badge ok">✓ chain verified · ${esc(verify.records)} records</span>`
      : `<span class="badge bad">✗ chain broken · ${esc((verify.problems || []).join('; '))}</span>`;
    head = ' · head ' + short(verify.head);
  } catch (e) {
    badge = '<span class="badge bad">✗ verification unavailable (' + esc(e.message) + ')</span>';
  }
  const rows = chain.map(r => `
    <div class="rec">
      <span class="k">seq ${esc(r.seq)} · ${esc(r.kind)} · ${esc(r.author)}</span><br>
      <span class="hash">${esc(r.recorded_at)} · prev ${short(r.prev)}</span>
    </div>`).join('');
  view.innerHTML = `
    <p class="sub"><a class="back" id="back3">← all threads</a></p>
    <h1 style="font-size:18px">${esc(slug)}</h1>
    <p>${badge}${head}</p>
    ${rows}`;
  document.getElementById('back3').addEventListener('click', showList);
}

showList();
</script>
</body>
</html>
